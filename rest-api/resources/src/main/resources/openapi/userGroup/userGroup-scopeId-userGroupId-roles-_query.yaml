openapi: 3.0.3

info:
  title: Eclipse Kapua REST API - User Group
  version: '1.0'
  contact:
    name: Eclipse Kapua Dev Team
    url: https://eclipse.org/kapua
    email: kapua-dev@eclipse.org
  license:
    name: Eclipse Public License 2.0
    url: https://www.eclipse.org/legal/epl-2.0

paths:
  /{scopeId}/userGroups/{userGroupId}/roles/_query:
    post:
      tags:
        - User Group Role
      summary: Query the User Group Roles
      operationId: userGroupRoleQuery
      parameters:
        - $ref: '../openapi.yaml#/components/parameters/scopeId'
        - $ref: './userGroup.yaml#/components/parameters/userGroupId'
      requestBody:
        $ref: '../openapi.yaml#/components/requestBodies/kapuaQuery'
      responses:
        200:
          description: The result of the query
          content:
            application/json:
              schema:
                $ref: '../group/group.yaml#/components/schemas/groupRoleListResult'
        400:
          $ref: '../openapi.yaml#/components/responses/illegalArgument'
        401:
          $ref: '../openapi.yaml#/components/responses/unauthenticated'
        403:
          $ref: '../openapi.yaml#/components/responses/subjectUnauthorized'
        500:
          $ref: '../openapi.yaml#/components/responses/kapuaError'
