paths: { }

components:
  schemas:
    accessToken:
      description: The token of a User session, obtained after a successful login.
      allOf:
        - $ref: '../openapi.yaml#/components/schemas/kapuaUpdatableEntity'
        - type: object
          properties:
            userId:
              $ref: '../openapi.yaml#/components/schemas/kapuaId'
            tokenId:
              $ref: '#/components/schemas/jwt'
            expiresOn:
              type: string
              format: 'date-time'
            invalidatedOn:
              type: string
              format: 'date-time'
            refreshToken:
              type: string
              format: uuid
            refreshExpiresOn:
              type: string
              format: 'date-time'
            trustKey:
              type: string
              description: A long-lived key to be used within an authentication with MFA from a trusted machine
              pattern: '^[A-Za-z0-9-_=]+\.[A-Za-z0-9-_=]+\.?[A-Za-z0-9-_.+/=]*$'
    ssoData:
      type: object
      description:
        SSO-account data, refers to logged account and populated only when the platform uses a SSO broker
      properties:
        accountSupportsBrokering:
          type: boolean
          description: Whether the logged account supports SSO brokering.
        accountSupportsDirectLogin:
          type: boolean
          description: Whether the logged account supports direct SSO login (without email and 2fa).
        brokeringApiConnectionIssues:
          type: boolean
          description: Whether the openID brokering API is currently unreachable, which may cause SSO login issues.
        uriSuffixDirectLogin:
          type: string
          description:
            The URI query suffix to append when redirecting to the direct login page for this account.
          example: '?accountid=my-account'
        companyDomainNames:
          type: array
          items:
            type: string
          description: the domain names associated to the company of the account
      example:
        accountSupportsBrokering: true
        accountSupportsDirectLogin: true
        brokeringApiConnectionIssues: false
        uriSuffixDirectLogin: '?accountid=my-account-name'
        companyDomainNames:
          - 'company.com'
          - 'company.org'
          - 'anothercompanydomain.net'
    loginInfo:
      type: object
      properties:
        accessToken:
          $ref: '#/components/schemas/accessToken'
        accessPermissions:
          description: The list of Permission directly to the User
          type: array
          items:
            $ref: '../accessInfo/accessInfo.yaml#/components/schemas/accessPermission'
        rolePermissions:
          description: The list of Permission assigned to the User via Roles
          type: array
          items:
            $ref: '../role/role.yaml#/components/schemas/rolePermission'
        groupPermissions:
          description: The list of Permission assigned to the User via UserGroups
          type: array
          items:
            $ref: '../group/group.yaml#/components/schemas/groupPermission'
        groupRolePermissions:
          description: The list of Permission assigned to the User via Roles assigned to UserGroups
          type: array
          items:
            $ref: '../role/role.yaml#/components/schemas/rolePermission'
#        ssoData:
#          $ref: '#/components/schemas/ssoData'
