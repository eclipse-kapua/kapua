    usernamePasswordCredentials:
      allOf:
      - type: object
        properties:
          user:
            $ref: '#/components/schemas/username'
          password:
            $ref: '#/components/schemas/password'
          authenticationCode:
            $ref: '#/components/schemas/authenticationCode'
          trustKey:
            $ref: '#/components/schemas/trustKey'
          trustMe:
            type: boolean
            description: Whether to generate a TrustKey or not.
    jwtCredentials:
      type: object
      properties:
        accessToken:
          type: string
          pattern: '^[A-Za-z0-9-_=]+\.[A-Za-z0-9-_=]+\.?[A-Za-z0-9-_.+/=]*$'
          description: The OpenID Connect <a href="https://auth0.com/blog/id-token-access-token-what-is-the-difference/#What-Is-an-Access-Token">accessToken</a>
        idToken:
          type: string
          pattern: '^[A-Za-z0-9-_=]+\.[A-Za-z0-9-_=]+\.?[A-Za-z0-9-_.+/=]*$'
          description: The OpenID Connect <a href="https://auth0.com/blog/id-token-access-token-what-is-the-difference/#What-Is-an-ID-Token">idToken</a>.
